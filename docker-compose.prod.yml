# AWS本番用（Lightsail / ECS共通）
# 使い方: docker compose -f docker-compose.prod.yml up -d
services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    # 本番はソースをイメージ内に含める（COPYのコメントを外すこと）
    restart: always
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
    networks:
      - app-network

  web:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    restart: always
    networks:
      - app-network
    depends_on:
      - app

  # 本番DBはLightsail DB or RDSを使うため、ここでは定義しない
  # DB接続情報は環境変数（.env）またはAWS SSMパラメータストアで管理

networks:
  app-network:
    driver: bridge
